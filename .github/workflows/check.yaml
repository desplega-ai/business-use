name: Format & Lint Checks

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check-core:
    name: Check Core (Python)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./core

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync

      - name: Check formatting with Ruff
        run: uv run ruff format --check src/

      - name: Lint with Ruff
        run: uv run ruff check src/

      - name: Type check with MyPy
        run: uv run mypy src/

  check-sdk-py:
    name: Check SDK-PY (Python)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./sdk-py

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync

      - name: Check formatting with Ruff
        run: uv run ruff format --check src/ tests/

      - name: Lint with Ruff
        run: uv run ruff check src/ tests/

      - name: Type check with MyPy
        run: uv run mypy src/

  check-sdk-js:
    name: Check SDK-JS (TypeScript)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./sdk-js

    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: './sdk-js/pnpm-lock.yaml'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check formatting with Prettier
        run: pnpm run format:check

      - name: Lint with ESLint
        run: pnpm run lint

      - name: Type check with TypeScript
        run: pnpm run typecheck

  check-ui:
    name: Check UI (React/TypeScript)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./ui

    steps:
      - uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Check formatting with Prettier
        run: bun run format:check

      - name: Lint with ESLint
        run: bun run lint

      - name: Type check with TypeScript
        run: bun run build

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: './sdk-js/pnpm-lock.yaml'

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install core dependencies
        run: cd core && uv sync

      - name: Run E2E tests
        run: bun run e2e/run.ts

  scan-dogfood:
    name: Dogfood Scan Action
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Scan TypeScript fixtures (dry-run)
        id: scan-ts
        uses: ./scan-action
        with:
          path: ./e2e/fixtures/typescript
          mode: dry-run
          format: json

      - name: Validate TypeScript graph
        uses: ./scan-action
        with:
          path: ./e2e/fixtures/typescript
          mode: validate

      - name: Verify scan results
        shell: bash
        run: |
          echo "Nodes: ${{ steps.scan-ts.outputs.node-count }}"
          echo "Flows: ${{ steps.scan-ts.outputs.flow-count }}"

          # 8 nodes = 4 per fixture file (pass_flow.ts + fail_flow.ts), 1 flow (checkout)
          if [ "${{ steps.scan-ts.outputs.node-count }}" -ne 8 ]; then
            echo "::error::Expected 8 nodes, got ${{ steps.scan-ts.outputs.node-count }}"
            exit 1
          fi
          if [ "${{ steps.scan-ts.outputs.flow-count }}" -ne 1 ]; then
            echo "::error::Expected 1 flow, got ${{ steps.scan-ts.outputs.flow-count }}"
            exit 1
          fi

          echo "Scan dogfood passed!"

  # Summary job that all checks passed
  all-checks:
    name: All Checks Passed
    runs-on: ubuntu-latest
    needs: [check-core, check-sdk-py, check-sdk-js, check-ui, e2e, scan-dogfood]
    steps:
      - run: echo "All formatting, linting, and type checks passed!"
