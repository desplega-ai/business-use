# Example GitHub Action: Scan JS/TS codebase for business-use SDK calls
#
# Copy this file to .github/workflows/scan.yaml in your project.
#
# Required secrets (for push mode only):
#   BUSINESS_USE_URL     - Your business-use backend URL
#   BUSINESS_USE_API_KEY - API key for the backend

name: Scan SDK Calls

on:
  push:
    branches: [main]
    paths: ["src/**/*.ts", "src/**/*.tsx", "src/**/*.js", "src/**/*.jsx"]
  pull_request:
    branches: [main]
    paths: ["src/**/*.ts", "src/**/*.tsx", "src/**/*.js", "src/**/*.jsx"]

jobs:
  scan:
    name: Extract SDK Nodes
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Preview + validate on PRs
      - name: Scan (dry-run)
        if: github.event_name == 'pull_request'
        id: scan
        uses: desplega-ai/business-use/scan-action@main
        with:
          path: ./src
          mode: dry-run
          format: table

      - name: Validate graph
        if: github.event_name == 'pull_request'
        uses: desplega-ai/business-use/scan-action@main
        with:
          path: ./src
          mode: validate

      # Optional: comment scan summary on PR
      - name: Comment on PR
        if: github.event_name == 'pull_request' && steps.scan.outputs.node-count > 0
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `**Scanner:** Found ${{ steps.scan.outputs.node-count }} nodes across ${{ steps.scan.outputs.flow-count }} flows.`
            })

      # Push to backend on merge to main
      - name: Push nodes
        if: github.event_name == 'push'
        uses: desplega-ai/business-use/scan-action@main
        with:
          path: ./src
          mode: push
          url: ${{ secrets.BUSINESS_USE_URL }}
          api-key: ${{ secrets.BUSINESS_USE_API_KEY }}
